# Ollama — local LLM serving with GPU
services:
  ollama:
    image: ollama/ollama:0.6.6
    container_name: ollama
    volumes:
      - ollama_persistent_storage:/root/.ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - global_docker_network

volumes:
  ollama_persistent_storage:
    external: true
    name: openwebui_ollama

networks:
  global_docker_network:
    external: true
    name: global_docker_network
