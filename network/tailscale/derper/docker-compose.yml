# Self-hosted DERP relay server
# Deploy on a server with a public IP and valid domain
services:
  derper:
    image: ghcr.io/yangchuansheng/derper:latest
    container_name: derper
    restart: unless-stopped
    environment:
      - DERP_DOMAIN=${DERP_DOMAIN}
      - DERP_CERT_DIR=/app/certs
      - DERP_CERT_MODE=manual
      - DERP_HTTP_PORT=-1
    ports:
      - "${BIND_PUBLIC:-0.0.0.0}:4825:443"        # DERP TCP
      - "${BIND_PUBLIC:-0.0.0.0}:43478:3478/udp"  # STUN
    volumes:
      - ./ssl:/app/certs
