# /etc/nginx/sites-available/derper.conf
# Reverse proxy for DERP with SSL termination

server {
    listen 80;
    listen [::]:80;
    server_name ${DERP_DOMAIN};
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ${DERP_DOMAIN};

    client_max_body_size 100m;

    ssl_certificate /etc/nginx/ssl/${DERP_DOMAIN}/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/${DERP_DOMAIN}/private.key;

    location / {
        proxy_pass http://127.0.0.1:4825;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90;
    }

    access_log /var/log/nginx/derper.access.log;
    error_log  /var/log/nginx/derper.error.log;
}
