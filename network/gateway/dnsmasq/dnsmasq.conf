# /etc/dnsmasq.conf
# Local DNS + DHCP server for LAN

# Interface to listen on
interface=${LAN_INTERFACE}
# Also listen on localhost
listen-address=127.0.0.1

# Upstream DNS servers
server=223.5.5.5
server=119.29.29.29

# Cache size
cache-size=1000

# DHCP range
dhcp-range=${LAN_SUBNET%.*}.100,${LAN_SUBNET%.*}.200,12h

# Local domain
domain=${DOMAIN}
local=/${DOMAIN}/

# Custom hosts file for local DNS overrides
addn-hosts=/etc/dnsmasq_hosts

# Don't read /etc/resolv.conf for upstream servers
no-resolv

# Logging
log-queries
log-facility=/var/log/dnsmasq.log
