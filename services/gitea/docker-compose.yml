# Gitea — self-hosted Git service
services:
  server:
    container_name: gitea
    image: gitea/gitea:latest
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA_ADMIN_USER=${GITEA_ADMIN_USER:-admin}
      - GITEA_ADMIN_PASSWORD=${GITEA_ADMIN_PASSWORD:?Set GITEA_ADMIN_PASSWORD}
      - GITEA_ADMIN_EMAIL=${GITEA_ADMIN_EMAIL:-admin@${DOMAIN}}
    restart: always
    ports:
      - "${BIND_WEB:-127.0.0.1}:4000:3000"  # Web UI
      - "${BIND_LAN:-0.0.0.0}:2222:22"      # SSH
    networks:
      - global_docker_network
    volumes:
      - ./data:/data/gitea/
      - ./config/app.ini:/data/gitea/conf/app.ini:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ${CA_CERT_PATH:-/opt/lab/certs/rootCA.pem}:/usr/local/share/ca-certificates/custom_host_ca.crt:ro
      - ./custom-entrypoint.sh:/custom-entrypoint.sh:ro
    dns:
      - ${GATEWAY_IP}
      - 8.8.8.8
    entrypoint:
      - /custom-entrypoint.sh

networks:
  global_docker_network:
    external: true
    name: global_docker_network
