# SearXNG settings
use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  formats:
    - html
    - json

ui:
  results_on_new_tab: true

engines:
  - name: baidu
    engine: baidu
    shortcut: bd
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
