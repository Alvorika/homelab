# Nextcloud — self-hosted file sync & share
services:
  nextcloud:
    image: nextcloud:31.0.7
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "${BIND_WEB:-127.0.0.1}:8003:80"
    volumes:
      - ${NEXTCLOUD_DATA_DIR:-/data/nextcloud/html}:/var/www/html
      - ${CA_CERT_PATH:-/opt/lab/certs/rootCA.pem}:/usr/local/share/ca-certificates/custom_host_ca.crt:ro
      - ./custom-entrypoint.sh:/custom-entrypoint.sh:ro
    dns:
      - ${GATEWAY_IP}
      - 8.8.8.8
    environment:
      POSTGRES_HOST: nextcloud_db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      REDIS_HOST: nextcloud_redis
      TRUSTED_PROXIES: 172.16.0.0/12 10.0.0.0/8
      OVERWRITEHOST: cloud.${DOMAIN}
      OVERWRITEPROTOCOL: https
    networks:
      - global_docker_network
    entrypoint:
      - /custom-entrypoint.sh

  nextcloud_db:
    image: postgres:13-alpine3.20
    container_name: nextcloud_db
    restart: always
    volumes:
      - ${NEXTCLOUD_DB_DATA_DIR:-/data/postgres/nextcloud}:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    networks:
      - global_docker_network

  nextcloud_redis:
    image: redis:alpine
    container_name: nextcloud_redis
    restart: always
    networks:
      - global_docker_network

networks:
  global_docker_network:
    external: true
    name: global_docker_network
